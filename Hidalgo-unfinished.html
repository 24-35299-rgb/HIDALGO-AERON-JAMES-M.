<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <!-- Tailwind CSS CDN (for super fast development) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap');
        
        :root {
            --teal: #14b8a6;
        }
        
        * {
            font-family: 'Inter', system-ui, sans-serif;
        }
        
        .nav-link {
            transition: all 0.3s ease;
        }
        
        .nav-link:hover {
            background-color: #0f766e;
            transform: translateY(-1px);
        }
        
        .section-box {
            background: linear-gradient(145deg, #14b8a6, #0f766e);
            box-shadow: 0 10px 15px -3px rgb(20 184 166);
        }
        
        .project-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .project-card:hover {
            transform: scale(1.05);
            box-shadow: 25px 25px 0 -10px #14b8a6;
        }
        
        .play-button {
            animation: pulse 2s infinite;
        }
        
        .modal {
            animation: modalPop 0.3s ease forwards;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        @keyframes modalPop {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .beach-bg {
            background-image: linear-gradient(rgba(15, 23, 42, 0.75), rgba(15, 23, 42, 0.85)), url('https://picsum.photos/id/1015/2000/1200');
            background-size: cover;
            background-position: center;
        }
        
        .profile-img {
            border: 8px solid #14b8a6;
            box-shadow: 0 0 0 8px rgba(20, 184, 166, 0.3);
        }
    </style>
</head>
<body class="bg-[#0f172a] text-white overflow-x-hidden">
    <!-- NAVBAR - Exact match to the mockup -->
    <nav class="bg-[#0f766e] py-4 sticky top-0 z-50 shadow-lg">
        <div class="max-w-7xl mx-auto px-8 flex items-center justify-between">
            <!-- Profile pic in navbar like mockup -->
            <div class="flex items-center gap-4">
                <img src="https://picsum.photos/id/1005/80/80" 
                     alt="Profile" 
                     class="w-12 h-12 rounded-2xl object-cover profile-img">
                <div class="hidden md:block">
                    <h1 class="text-2xl font-semibold tracking-tight">JOHN DOE</h1>
                    <p class="text-xs text-teal-200 -mt-1">Web Developer &amp; Designer</p>
                </div>
            </div>
